<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXT ACADEMY — Dashboard de Tráfego Pago</title>
<style>
  :root{
    --bg:#0a0a0a; --card:#141414; --card2:#1d1d1d; --line:#2c2c2c;
    --txt:#f5f5f5; --mut:#9a9a9a; --orange:#F15A03; --orange-d:#c2410c;
    --green:#22c55e; --red:#ef4444;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
    background:var(--bg);color:var(--txt);padding:0 0 32px;line-height:1.4}
  .topbar{background:#000;border-bottom:3px solid var(--orange);padding:16px 24px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .topbar img{height:40px}
  .topbar .tag{color:var(--orange);font-weight:800;font-size:12px;letter-spacing:2px;text-transform:uppercase}
  .wrap{max-width:1080px;margin:0 auto;padding:24px}
  h1{font-size:21px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
  h1 span{color:var(--orange)}
  .sub{color:var(--mut);font-size:13px;margin-bottom:22px}
  .grid{display:grid;grid-template-columns:340px 1fr;gap:20px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px}
  .panel h2{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--orange);
    font-weight:800;margin-bottom:16px}
  .ctrl{margin-bottom:18px}
  .ctrl label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:7px}
  .ctrl label b{color:var(--orange);font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;height:5px;border-radius:5px;background:var(--card2);
    appearance:none;outline:none}
  input[type=range]::-webkit-slider-thumb{appearance:none;width:18px;height:18px;border-radius:50%;
    background:var(--orange);cursor:pointer;border:3px solid #0a0a0a}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;
    background:var(--orange);cursor:pointer;border:3px solid #0a0a0a}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
  .kpi{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:14px}
  .kpi.hl{border-color:var(--orange);background:rgba(241,90,3,.08)}
  .kpi .lab{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
  .kpi .val{font-size:23px;font-weight:800;margin-top:5px;font-variant-numeric:tabular-nums}
  .kpi.hl .val{color:var(--orange)}
  .kpi .val.sm{font-size:19px}
  .funnel{margin-top:6px}
  .step{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .step .barwrap{flex:1;background:var(--card2);border-radius:8px;overflow:hidden;height:34px}
  .step .bar{height:100%;display:flex;align-items:center;padding-left:12px;font-weight:700;
    font-size:13px;border-radius:8px;white-space:nowrap;transition:width .3s ease;color:#fff}
  .step .name{width:120px;font-size:12px;color:var(--mut);text-align:right;text-transform:uppercase;letter-spacing:.5px}
  .row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .row:last-child{border:none}
  .row span:last-child{font-weight:700;font-variant-numeric:tabular-nums}
  .verdict{margin-top:16px;padding:12px 14px;border-radius:10px;font-size:13px;font-weight:700}
  .v-good{background:rgba(34,197,94,.14);color:#86efac;border:1px solid rgba(34,197,94,.35)}
  .v-mid{background:rgba(241,90,3,.14);color:#fdba74;border:1px solid rgba(241,90,3,.4)}
  .v-bad{background:rgba(239,68,68,.14);color:#fca5a5;border:1px solid rgba(239,68,68,.35)}
  .reset{margin-top:8px;background:transparent;color:var(--mut);border:1px solid var(--line);
    border-radius:8px;padding:9px 12px;cursor:pointer;font-size:12px;width:100%;
    text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  .reset:hover{color:var(--orange);border-color:var(--orange)}
</style>
</head>

  <h1>Dashboard de <span>Tráfego Pago</span></h1>
  <div class="sub">Mexa nos controles e veja o funil, o CAC e o retorno recalcularem na hora.</div>
  <div class="grid">
    <div class="panel">
      <h2>Controles</h2>
      <div class="ctrl"><label>Verba de tráfego <b id="lVerba"></b></label>
        <input type="range" id="verba" min="1000" max="100000" step="500" value="10000"></div>
      <div class="ctrl"><label>Custo por Lead (CPL) <b id="lCpl"></b></label>
        <input type="range" id="cpl" min="1" max="30" step="0.10" value="5.60"></div>
      <div class="ctrl"><label>Taxa de agendamento <b id="lAgend"></b></label>
        <input type="range" id="agend" min="1" max="80" step="1" value="20"></div>
      <div class="ctrl"><label>Taxa de conversão <b id="lConv"></b></label>
        <input type="range" id="conv" min="1" max="80" step="1" value="30"></div>
      <div class="ctrl"><label>Ticket médio <b id="lTicket"></b></label>
        <input type="range" id="ticket" min="100" max="10000" step="1" value="2997"></div>
      <button class="reset" id="reset">Restaurar valores base</button>
    </div>

      <h2>Resultados</h2>
      <div class="kpis">
        <div class="kpi hl"><div class="lab">Vendas</div><div class="val" id="kVendas"></div></div>

<script>
const BASE={verba:10000,cpl:5.60,agend:20,conv:30,ticket:2997};
const ids=['verba','cpl','agend','conv','ticket'];
const el=id=>document.getElementById(id);
const brl=n=>n.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
const brl2=n=>n.toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:2,maximumFractionDigits:2});
const num=n=>n.toLocaleString('pt-BR',{maximumFractionDigits:0});
function calc(){
  const verba=+el('verba').value,cpl=+el('cpl').value,agend=+el('agend').value/100,
        conv=+el('conv').value/100,ticket=+el('ticket').value;
  el('lVerba').textContent=brl(verba);el('lCpl').textContent=brl2(cpl);
  el('lAgend').textContent=el('agend').value+'%';el('lConv').textContent=el('conv').value+'%';
  el('lTicket').textContent=brl(ticket);
  const leads=verba/cpl,ags=leads*agend,vendas=ags*conv;
  const fat=vendas*ticket,lucro=fat-verba,roi=verba?lucro/verba:0,roas=verba?fat/verba:0;
  const cac=vendas?verba/vendas:0,cpa=ags?verba/ags:0;
  el('kVendas').textContent=num(vendas);el('kCac').textContent=brl(cac);
  el('kRoas').textContent=roas.toFixed(1)+'x';el('kFat').textContent=brl(fat);
  el('kLucro').textContent=brl(lucro);el('kRoi').textContent=Math.round(roi*100)+'%';
  el('rCpa').textContent=brl2(cpa);el('rLeads').textContent=num(leads);
  const mx=leads||1;
  el('bLeads').style.width='100%';el('bLeads').textContent=num(leads)+' leads';
  el('bAgend').style.width=Math.max(ags/mx*100,9)+'%';el('bAgend').textContent=num(ags);
  el('bVendas').style.width=Math.max(vendas/mx*100,9)+'%';el('bVendas').textContent=num(vendas)+' vendas';
  const v=el('verdict');
  if(roas>=3){v.className='verdict v-good';v.textContent='\u2705 Cenário lucrativo: cada R$ 1 investido retorna '+roas.toFixed(1)+'x. CAC de '+brl(cac)+' por cliente.';}
  else if(roas>=1){v.className='verdict v-mid';v.textContent='\u26A0\uFE0F Margem apertada: ROAS '+roas.toFixed(1)+'x. Acima de 1x você lucra, mas há pouca folga.';}
  else{v.className='verdict v-bad';v.textContent='\uD83D\uDD34 Prejuízo: ROAS '+roas.toFixed(1)+'x. O faturamento não cobre a verba investida.';}
}
ids.forEach(id=>el(id).addEventListener('input',calc));
el('reset').addEventListener('click',()=>{for(const k in BASE)el(k).value=BASE[k];calc();});
calc();
</script>
